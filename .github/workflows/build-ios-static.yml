name: Build iOS Static

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      go_tags:
        description: Go build tags
        required: false
        default: ""
      ios_min_version:
        description: iOS minimum deployment target
        required: false
        default: "15.0"

jobs:
  build-ios-static:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build libmihomo.a and header
        env:
          GO_TAGS: ${{ github.event.inputs.go_tags || '' }}
          IOS_MIN_VERSION: ${{ github.event.inputs.ios_min_version || '15.0' }}
        run: bash .github/scripts/build-ios-static.sh

      - name: Verify outputs
        run: |
          ls -la build/ios-static
          test -f build/ios-static/libmihomo.a
          test -f build/ios-static/libmihomo.h

      - name: Upload libmihomo.a
        uses: actions/upload-artifact@v4
        with:
          name: libmihomo-a
          path: build/ios-static/libmihomo.a

      - name: Upload libmihomo.h
        uses: actions/upload-artifact@v4
        with:
          name: libmihomo-h
          path: build/ios-static/libmihomo.h

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-static-lib
          path: |
            build/ios-static/libmihomo.a
            build/ios-static/libmihomo.h
